version: "3.9"

# Local development infra for the AI Enterprise Platform
# Services:
# - OpenSearch (single-node, security disabled)
# - Kafka (single-node KRaft)
# - Optional UIs: OpenSearch Dashboards, Kafka UI
# - PostgreSQL 16
# - Redis (for API Gateway and Query Service)
# - Application services: api-gateway, document-ingestion-service, embedding-service, query-service, ai-governance-service
#
# Usage:
#   cd infra
#   docker compose up -d --build
#
# Verify:
#   curl http://localhost:9200
#   Open http://localhost:5601 (Dashboards) and http://localhost:8085 (Kafka UI)

name: ai-enterprise-platform

services:
  opensearch:
    image: opensearchproject/opensearch:2.11.1
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=admin
      - DISABLE_SECURITY_PLUGIN=true
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"   # REST API
      - "9600:9600"   # Performance Analyzer
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200 >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - ai-net

  dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.1
    container_name: opensearch-dashboards
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
    ports:
      - "5601:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - ai-net

  kafka:
    image: bitnami/kafka:3.6
    container_name: kafka
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:29092
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092,EXTERNAL://localhost:29092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_ENABLE_KRAFT=yes
    ports:
      - "9092:9092"     # inside-docker access
      - "29092:29092"   # host access
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - ai-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    ports:
      - "8085:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - ai-net

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=ai
      - POSTGRES_PASSWORD=ai_password
      - POSTGRES_DB=ai_platform
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai -d ai_platform"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - ai-net

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks:
      - ai-net

  # Application services
  api-gateway:
    build:
      context: ../api-gateway
      dockerfile: Dockerfile
    image: ai-platform/api-gateway:local
    container_name: api-gateway
    environment:
      - KAFKA_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - SPRING_APPLICATION_JSON={"eureka":{"client":{"enabled":false}}}
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    networks:
      - ai-net

  document-ingestion-service:
    build:
      context: ../document-ingestion-service
      dockerfile: Dockerfile
    image: ai-platform/document-ingestion-service:local
    container_name: document-ingestion-service
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/ai_platform
      - DB_USER=ai
      - DB_PASS=ai_password
      - KAFKA_SERVERS=kafka:9092
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - SPRING_APPLICATION_JSON={"eureka":{"client":{"enabled":false}}}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - ai-net

  embedding-service:
    build:
      context: ../embedding-service
      dockerfile: Dockerfile
    image: ai-platform/embedding-service:local
    container_name: embedding-service
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/ai_platform
      - DB_USER=ai
      - DB_PASS=ai_password
      - KAFKA_SERVERS=kafka:9092
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - AI_BASE_URL=http://localhost:11434
      - SPRING_APPLICATION_JSON={"eureka":{"client":{"enabled":false}}}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    ports:
      - "8082:8082"
    networks:
      - ai-net

  query-service:
    build:
      context: ../query-service
      dockerfile: Dockerfile
    image: ai-platform/query-service:local
    container_name: query-service
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/ai_platform
      - DB_USER=ai
      - DB_PASS=ai_password
      - KAFKA_SERVERS=kafka:9092
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - EMBEDDING_SERVICE_URL=http://embedding-service:8082
      - SPRING_APPLICATION_JSON={"eureka":{"client":{"enabled":false}}}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      embedding-service:
        condition: service_started
    ports:
      - "8083:8083"
    networks:
      - ai-net

  ai-governance-service:
    build:
      context: ../ai-governance-service
      dockerfile: Dockerfile
    image: ai-platform/ai-governance-service:local
    container_name: ai-governance-service
    environment:
      - DB_URL=jdbc:postgresql://postgres:5432/ai_platform
      - DB_USER=ai
      - DB_PASS=ai_password
      - KAFKA_SERVERS=kafka:9092
      - OPENSEARCH_HOST=opensearch
      - OPENSEARCH_PORT=9200
      - SPRING_APPLICATION_JSON={"eureka":{"client":{"enabled":false}}}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
      opensearch:
        condition: service_healthy
    ports:
      - "8084:8084"
    networks:
      - ai-net

volumes:
  pgdata:
    driver: local

networks:
  ai-net:
    driver: bridge
